name: 每日市场数据采集

on:
  schedule:
    # 北京时间 05:30（UTC 21:30），周一到周五
    # 此时美股（4PM ET）和港股（4PM HKT）均已收盘
    - cron: '30 21 * * 0-4'   # UTC周日到周四 = 北京时间周一到周五

  workflow_dispatch:            # 允许手动触发（测试用）

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests

      - name: 运行数据采集
        run: python daily_fetch.py

      - name: 提交数据文件
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto: daily market data ${{ github.run_number }}"
          file_pattern: "data/daily_latest.md"
