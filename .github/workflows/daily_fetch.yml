name: 每日市场数据采集

on:
  schedule:
    - cron: '30 21 * * 0-4'
  workflow_dispatch:

permissions:
  contents: write        # ← 新增这两行，授权bot写入仓库

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests

      - name: 运行数据采集
        run: python daily_fetch.py

      - name: 提交数据文件
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto: daily market data ${{ github.run_number }}"
          file_pattern: "data/daily_latest.md"
